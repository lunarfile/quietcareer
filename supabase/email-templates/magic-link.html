<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#F4F4F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F4F5;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#FFFFFF;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 0;text-align:center;">
              <p style="margin:0 0 20px;font-size:20px;font-weight:700;color:#1A1A1A;letter-spacing:-0.02em;">QuietCareer</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;">
              <h1 style="margin:0 0 16px;font-size:22px;font-weight:600;color:#1A1A1A;">Sign in to QuietCareer</h1>
              <p style="margin:0 0 12px;font-size:15px;line-height:1.6;color:#4B5563;">Click the button below to sign in. No password needed.</p>
              <p style="margin:0 0 28px;font-size:14px;line-height:1.6;color:#6B7280;">This link expires in 1 hour.</p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 36px;background-color:#C9A84C;color:#FFFFFF;font-size:15px;font-weight:600;text-decoration:none;border-radius:8px;">Sign In</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr><td style="padding:0 32px;"><div style="height:1px;background-color:#E5E7EB;"></div></td></tr>
          <tr>
            <td style="padding:20px 32px 28px;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#9CA3AF;text-align:center;">If you didn't request this, you can safely ignore it.</p>
            </td>
          </tr>
        </table>
        <p style="margin:20px 0 0;font-size:11px;color:#9CA3AF;text-align:center;">QuietCareer — Built for you, not your employer.</p>
      </td>
    </tr>
  </table>
</body>
</html>
