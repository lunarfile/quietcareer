<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#0F0F12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0F0F12;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#161619;border-radius:16px;border:1px solid #2A2A32;overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 0;text-align:center;">
              <div style="width:48px;height:48px;margin:0 auto 16px;background-color:rgba(201,168,76,0.1);border-radius:12px;line-height:48px;font-size:24px;">&#x1F4E7;</div>
              <h1 style="margin:0;font-size:22px;font-weight:600;color:#E8E4DE;letter-spacing:-0.02em;">Confirm Email Change</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px;">
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#9B9690;">
                You requested to change your email address for your QuietCareer account. Click below to confirm.
              </p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;background-color:#C9A84C;color:#0F0F12;font-size:15px;font-weight:600;text-decoration:none;border-radius:10px;">
                      Confirm New Email
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#6B6660;text-align:center;">
                If you didn't request this change, please secure your account immediately.
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0;font-size:11px;color:#6B6660;text-align:center;">
          QuietCareer &mdash; Built for you, not your employer.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
